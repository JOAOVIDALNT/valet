name: Auto Triage

on:
  issues:
    types: [opened]

jobs:
  welcome-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome Comment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Hello! 👋 Thanks for opening this issue.\n\nIt has been automatically marked with the `triage` label, and one of the project maintainers will review it shortly to assess its feasibility and priority. Don't worry, you'll be notified here as soon as we have an update!"
            })