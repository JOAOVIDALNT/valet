name: Publish Valet to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build, Pack and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Validate tag major for .NET 10 only
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MAJOR=${VERSION%%.*}

          if [ "$MAJOR" -lt 5 ]; then
            echo "This release contains a breaking runtime change (.NET 10 only)."
            echo "Use a major tag >= v5.0.0. Current tag: ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          dotnet pack \
            --configuration Release \
            --no-build \
            /p:Version=$VERSION \
            --output ./artifacts

      - name: Publish to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
